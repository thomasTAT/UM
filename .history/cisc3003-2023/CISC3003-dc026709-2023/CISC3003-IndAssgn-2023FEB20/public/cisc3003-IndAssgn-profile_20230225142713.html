<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>CISC3003: Practice 04</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/cisc3003-IndAssgn-profile.css">
</head>

<body>
    <header>
        <h1>Thomas's ePortfolio </h1>
        <p>search this site</p>
    </header>
    <main>
        <section>
            <h2 style="display: none">This is a form</h2>
            <form>
                <fieldset>
                    <legend>Photo Details</legend>
                    <table>
                        <tr>
                            <td>
                                <label for="continent">Continent</label>
                                <br>
                                <select name="continent" id="continent">
                                    <option value="africa">Africa</option>
                                    <option value="asia">Asia</option>
                                    <option value="eu">Europe</option>
                                    <option value="NA">North America</option>
                                    <option value="SA">South America</option>
                                </select>
                                <br>
                                <label for="country">Country</label>
                                <br>
                                <select name="country" id="country">
                                    <option value="canada">Canada</option>
                                    <option value="mexico">Mexico</option>
                                    <option value="united-states">United States</option>
                                </select>
                                <br>
                                <label for="city">City</label>
                                <br>
                                <select name="city" id="city">
                                    <option value="calgary">Calgary</option>
                                    <option value="montreal">Montreal</option>
                                    <option value="toronto">Toronto</option>
                                    <option value="vancouver">Vancouver</option>
                                </select>
                                <br>
                            </td>
                            \ <td>
                                <div class="border">
                                    <label>Copyright?</label>
                                    <br>
                                    <input type="radio" name="reserved" id="reserved" value="reserved">
                                    <label for="reserved">All rights reserved</label>
                                    <br>
                                    <input type="radio" name="commons" id="commons" value="commons">
                                    <label for="commons">Creative Commons</label>
                                    <br>
                                </div>
                                <div class="border">
                                    <label>Creative Commons Types</label>
                                    <br>
                                    <input type="checkbox" name="cc[]" value="1">Attribution
                                    <br>
                                    <input type="checkbox" name="cc[]" value="2">Noncommercial
                                    <br>
                                    <input type="checkbox" name="cc[]" value="3">No Derivative
                                    Works <br>
                                </div>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </section>
    </main>
</body>

</html>
